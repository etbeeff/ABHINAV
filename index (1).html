
<!doctype html>
<html lang="en">
<head>

  <style>
    :root { color-scheme: light dark; --bg1: #0f172a; --bg2: #1f2937; --fg: #e5e7eb; --accent: #60a5fa; }
    * { box-sizing: border-box }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
           min-height: 100svh; display:grid; place-items:center;
           background: radial-gradient(1200px 600px at 20% 10%, rgba(96,165,250,.12), transparent 50%),
                       linear-gradient(160deg, var(--bg1), var(--bg2));
           color: var(--fg);
    }
    main { width: min(860px, 92vw); padding: 2.25rem; }
    .card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14);
            backdrop-filter: blur(6px); border-radius: 18px; padding: clamp(1.25rem, 3vw, 2rem);
            box-shadow: 0 12px 36px rgba(0,0,0,.35); }
    h1 { margin: 0 0 .35rem; font-size: clamp(1.8rem, 4.8vw, 3.2rem); letter-spacing: .015em; }
    p { margin: .4rem 0; line-height: 1.6; font-size: clamp(1rem, 1.2vw, 1.125rem); opacity: .92 }
    .badges { display:flex; flex-wrap:wrap; gap:.5rem; margin-top: .75rem }
    .badge { padding: .35rem .55rem; border-radius: 999px; border:1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.08); font-size: .85rem }
    .cta { display:flex; gap:.6rem; flex-wrap:wrap; margin-top: 1rem }
    a.btn { text-decoration:none; color:#0b1020; background: var(--accent); font-weight:700; padding:.75rem 1rem; border-radius:12px; box-shadow: inset 0 -2px 0 rgba(0,0,0,.22) }
    a.ghost { color: var(--fg); border:1px solid rgba(255,255,255,.28); background: transparent }
    code { background: rgba(0,0,0,.28); padding: .18rem .38rem; border-radius: 6px }
    footer { margin-top: 1rem; opacity:.7; font-size:.92rem }
  </style>
</head>
